name: hive_setu
description: "Hive Setu — India's Beekeeping Super-App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # Fonts & Icons
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Local Storage
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Networking
  dio: ^5.6.0
  retrofit: ^4.1.0

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.4

  # Code Generation Helpers
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.69.0
  pinput: ^5.0.0
  signature: ^5.5.0
  cached_network_image: ^3.3.1

  # Camera & Media
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  google_maps_flutter: ^2.7.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # QR & PDF
  qr_flutter: ^4.1.0
  pdf: ^3.11.1
  printing: ^5.13.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.5
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.12
  drift_dev: ^2.18.0
  injectable_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  retrofit_generator: 9.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
